name: Deploy (IONOS)

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - main

concurrency:
  group: deploy-ionos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          for name in DEPLOY_SSH_HOST DEPLOY_SSH_USER DEPLOY_PATH; do
            if [ -z "${!name}" ]; then
              echo "Missing required secret: $name"
              exit 1
            fi
          done
          if [ -z "${DEPLOY_SSH_PRIVATE_KEY}" ] && [ -z "${DEPLOY_SSH_PASSWORD}" ]; then
            echo "Missing auth secret: set DEPLOY_SSH_PRIVATE_KEY or DEPLOY_SSH_PASSWORD"
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, pdo_mysql
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install production PHP dependencies
        run: composer install --no-dev --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Build deploy artifact
        run: |
          rm -rf /tmp/deploy-artifact
          mkdir -p /tmp/deploy-artifact
          rsync -a . /tmp/deploy-artifact \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".idea" \
            --exclude ".vscode" \
            --exclude "node_modules" \
            --exclude "tests" \
            --exclude "docker" \
            --exclude "playwright-report" \
            --exclude "test-results" \
            --exclude ".env" \
            --exclude ".env.*" \
            --exclude "storage/logs/*" \
            --exclude "storage/framework/testing/*"

      - name: Setup SSH
        env:
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          if [ -n "${DEPLOY_SSH_PRIVATE_KEY}" ]; then
            printf "%s" "$DEPLOY_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
          fi
          ssh-keyscan -p "${DEPLOY_SSH_PORT:-22}" -H "$DEPLOY_SSH_HOST" >> ~/.ssh/known_hosts

      - name: Install sshpass (for password auth)
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Sync files to server
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
        run: |
          if [ -n "${DEPLOY_SSH_PRIVATE_KEY}" ]; then
            rsync -az \
              -e "ssh -p ${DEPLOY_SSH_PORT:-22}" \
              /tmp/deploy-artifact/ \
              "${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}:${DEPLOY_PATH}/"
          else
            sshpass -p "${DEPLOY_SSH_PASSWORD}" rsync -az \
              -e "ssh -p ${DEPLOY_SSH_PORT:-22}" \
              /tmp/deploy-artifact/ \
              "${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}:${DEPLOY_PATH}/"
          fi

      - name: Run post-deploy Laravel commands
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PHP_BIN: ${{ secrets.DEPLOY_PHP_BIN }}
          DEPLOY_RUN_MIGRATIONS: ${{ secrets.DEPLOY_RUN_MIGRATIONS }}
        run: |
          if [ -n "${DEPLOY_SSH_PRIVATE_KEY}" ]; then
            SSH_CMD="ssh -p ${DEPLOY_SSH_PORT:-22} ${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}"
          else
            SSH_CMD="sshpass -p ${DEPLOY_SSH_PASSWORD} ssh -p ${DEPLOY_SSH_PORT:-22} ${DEPLOY_SSH_USER}@${DEPLOY_SSH_HOST}"
          fi
          ${SSH_CMD} <<EOF
          set -eu
          DEPLOY_TARGET="${DEPLOY_PATH}"
          case "$DEPLOY_TARGET" in
            "~"|"~/"*) DEPLOY_TARGET="$HOME${DEPLOY_TARGET#\~}" ;;
          esac
          cd "$DEPLOY_TARGET"
          if [ -f "$HOME/.profile" ]; then . "$HOME/.profile"; fi
          if [ -f "$HOME/.bash_profile" ]; then . "$HOME/.bash_profile"; fi
          if [ -f "$HOME/.bashrc" ]; then . "$HOME/.bashrc"; fi
          shopt -s expand_aliases || true
          export PATH="$HOME/bin:/usr/local/bin:/usr/bin:/bin:$PATH"

          PREFERRED_PHP_BIN="$(printf '%s' "${DEPLOY_PHP_BIN:-}" | tr -d '\r' | sed -e 's/^ *//' -e 's/ *$//' -e 's/^\"//' -e 's/\"$//')"
          PHP_BIN=""
          for candidate in "$PREFERRED_PHP_BIN" php php8.4-cli php8.4 php84 php-cli; do
            [ -n "$candidate" ] || continue
            if [ -x "$candidate" ]; then
              :
            elif ! command -v "$candidate" >/dev/null 2>&1; then
              continue
            fi
            if [ "$("$candidate" -r 'echo PHP_SAPI;' 2>/dev/null || true)" = "cli" ]; then
              PHP_BIN="$candidate"
              break
            fi
          done

          if [ -z "$PHP_BIN" ]; then
            echo "No usable PHP CLI binary found on server."
            for probe in "$PREFERRED_PHP_BIN" php php8.4-cli php8.4 php84 php-cli; do
              [ -n "$probe" ] || continue
              echo "probe: $probe"
              command -v "$probe" || true
              "$probe" -v 2>/dev/null | head -n 1 || true
            done
            exit 1
          fi

          "$PHP_BIN" artisan optimize:clear
          if [ ! -L public/storage ]; then
            "$PHP_BIN" artisan storage:link || true
          fi
          if [ "${DEPLOY_RUN_MIGRATIONS:-false}" = "true" ]; then
            "$PHP_BIN" artisan migrate --force
          fi
          "$PHP_BIN" artisan config:cache
          "$PHP_BIN" artisan route:cache
          "$PHP_BIN" artisan view:cache
          EOF
