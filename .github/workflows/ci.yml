name: CI

on:
  pull_request:
  push:

jobs:
  php-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, pdo_sqlite, sqlite3
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-

      - name: Prepare environment file
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Prepare test environment
        run: |
          php artisan key:generate
          touch database/database.sqlite

      - name: Run migrations
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
        run: php artisan migrate --force

      - name: Run PHP tests
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
          CACHE_STORE: array
          SESSION_DRIVER: array
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array
        run: php artisan test

      - name: Composer audit
        run: composer audit --no-interaction

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: npm audit
        run: npm audit --audit-level=moderate

  e2e-browser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, bcmath, pdo_sqlite, sqlite3
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Prepare app for E2E
        run: |
          cp .env.example .env
          php artisan key:generate
          touch database/e2e.sqlite
          php artisan migrate --force
          php artisan db:seed --class=ShieldSeeder --force
          php artisan tinker --execute="\App\Models\Team::factory()->create(['name' => 'E2E Team']);"
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: database/e2e.sqlite
          CACHE_STORE: array
          SESSION_DRIVER: file
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array

      - name: Run Laravel server
        run: php artisan serve --host=127.0.0.1 --port=8000 > /tmp/laravel-e2e.log 2>&1 &
        env:
          APP_ENV: testing
          DB_CONNECTION: sqlite
          DB_DATABASE: database/e2e.sqlite
          CACHE_STORE: array
          SESSION_DRIVER: file
          QUEUE_CONNECTION: sync
          MAIL_MAILER: array

      - name: Wait for app
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8000/login > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "App did not become ready in time."
          exit 1

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true
          E2E_BASE_URL: http://localhost:8000
          E2E_ADMIN_EMAIL: admin@example.com
          E2E_ADMIN_PASSWORD: password123

      - name: Capture UI review artifacts
        if: github.event_name == 'pull_request'
        run: npm run test:e2e:ui-review
        env:
          CI: true
          E2E_BASE_URL: http://localhost:8000
          E2E_ADMIN_EMAIL: admin@example.com
          E2E_ADMIN_PASSWORD: password123

      - name: Prepare UI review preview content
        if: always() && github.event_name == 'pull_request'
        run: |
          node scripts/prepare-ui-review-preview.mjs \
            --input test-results/ui-review \
            --output ui-review-preview \
            --base-url "https://raw.githubusercontent.com/${{ github.repository }}/ui-review-previews/pr-${{ github.event.pull_request.number }}" \
            --comment-file ui-review-preview-comment.md \
            --run-url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

      - name: Publish UI review preview files
        if: always() && github.event_name == 'pull_request'
        run: |
          git fetch origin ui-review-previews || true
          rm -rf /tmp/ui-review-previews

          if git show-ref --verify --quiet refs/remotes/origin/ui-review-previews; then
            git worktree add /tmp/ui-review-previews origin/ui-review-previews
          else
            git worktree add --detach /tmp/ui-review-previews
            cd /tmp/ui-review-previews
            git checkout --orphan ui-review-previews
            find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          fi

          mkdir -p /tmp/ui-review-previews/pr-${{ github.event.pull_request.number }}
          rm -rf /tmp/ui-review-previews/pr-${{ github.event.pull_request.number }}/*
          cp -R "$GITHUB_WORKSPACE/ui-review-preview/." /tmp/ui-review-previews/pr-${{ github.event.pull_request.number }}/

          cd /tmp/ui-review-previews
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pr-${{ github.event.pull_request.number }}

          if git diff --cached --quiet; then
            exit 0
          fi

          git commit -m "Update UI review preview for PR #${{ github.event.pull_request.number }}"
          git push origin HEAD:ui-review-previews

      - name: Comment UI review preview on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('ui-review-preview-comment.md', 'utf8');
            const marker = '<!-- ui-review-preview -->';
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }

      - name: Summarize UI review artifacts
        if: always() && github.event_name == 'pull_request'
        run: |
          {
            echo "### UI review artifacts"
            echo "Download the \`ui-review-artifacts\` artifact from this run before approving UI-affecting changes."
            echo "The PR should also have an updated comment with inline motion previews and still images."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload UI review artifacts
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@v7
        with:
          name: ui-review-artifacts
          path: |
            test-results/ui-review
          if-no-files-found: warn

      - name: Upload Playwright artifacts (on failure)
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
            /tmp/laravel-e2e.log
          if-no-files-found: ignore

  prod-security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          coverage: none

      - name: Build release-like workspace (no dev files)
        run: |
          rm -rf /tmp/release-scan
          mkdir -p /tmp/release-scan
          rsync -a . /tmp/release-scan \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".idea" \
            --exclude ".vscode" \
            --exclude "node_modules" \
            --exclude "tests" \
            --exclude "docker" \
            --exclude "playwright-report" \
            --exclude "test-results" \
            --exclude "storage/logs/*" \
            --exclude "storage/framework/testing/*"

      - name: Install production Composer dependencies
        working-directory: /tmp/release-scan
        run: composer install --no-dev --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Audit production Composer dependencies
        working-directory: /tmp/release-scan
        run: composer audit --no-interaction --no-dev

      - name: Install Semgrep
        run: python3 -m pip install --user semgrep

      - name: Run static security scan on release artifact
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          semgrep --config p/security-audit --error /tmp/release-scan
