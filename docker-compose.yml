services:
    app:
        build:
            context: .
            dockerfile: Dockerfile
        working_dir: /var/www/html
        command: sh -lc "./docker/start-app.sh"
        environment:
            APP_URL: http://localhost:8003
            DB_CONNECTION: mysql
            DB_HOST: mariadb
            DB_PORT: 3306
            DB_DATABASE: laravel
            DB_USERNAME: laravel
            DB_PASSWORD: password
        volumes:
            - .:/var/www/html
            - ~/.ssh:/root/.ssh:ro
            - ~/.gitconfig:/root/.gitconfig:ro
        ports:
            - "8003:8000"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        depends_on:
            mariadb:
                condition: service_healthy

    mariadb:
        image: mariadb:10.11
        environment:
            MARIADB_DATABASE: laravel
            MARIADB_USER: laravel
            MARIADB_PASSWORD: password
            MARIADB_ROOT_PASSWORD: secret
        healthcheck:
            test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-psecret"]
            interval: 5s
            timeout: 5s
            retries: 20
        volumes:
            - db_data:/var/lib/mysql
        ports:
            - "3309:3306"

    vite:
        image: node:22-alpine
        working_dir: /var/www/html
        command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
        environment:
            CHOKIDAR_USEPOLLING: "1"
            WATCHPACK_POLLING: "true"
        volumes:
            - .:/var/www/html
        ports:
            - "5173:5173"
        depends_on:
            - app

volumes:
    db_data:
